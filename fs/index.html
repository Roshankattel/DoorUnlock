<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>Door Unlock — Setup</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f6ef7;
      --accent-hover: #3d5be0;
      --accent-active: #2e4bcc;
      --danger: #e0453a;
      --danger-hover: #c73a30;
      --success: #27ae60;
      --success-hover: #219150;
      --text: #e8eaf0;
      --text-muted: #8a90a8;
      --input-bg: #12151f;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html,
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
    }

    .header-inner {
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      height: 60px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .header-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.05rem;
    }

    /* ── Main layout ── */
    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 1.5rem 1rem 2.5rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 0;
      box-shadow: var(--shadow);
    }

    .card+.card {
      margin-top: 1.75rem;
    }

    .card-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* ── Form fields ── */
    .field {
      margin-bottom: 1rem;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.01em;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
    }

    .input-row input {
      flex: 1;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.6rem 0.85rem;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      -webkit-appearance: none;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder,
    input[type="number"]::placeholder {
      color: #3e4460;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.18);
    }

    /* number input arrows on dark bg */
    input[type="number"]::-webkit-inner-spin-button {
      opacity: 0.4;
    }

    /* ── WiFi dropdown button (aligned with SSID input, slightly larger tap target) ── */
    .wifi-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.65rem 1.05rem;
      min-height: 2.75rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .wifi-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    .wifi-btn svg {
      width: 18px;
      height: 18px;
      display: block;
      flex-shrink: 0;
    }

    /* ── Dropdown ── */
    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 220px;
      max-height: 240px;
      overflow-y: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
      z-index: 100;
    }

    .dropdown-content a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0.85rem;
      font-size: 0.88rem;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.12s;
    }

    .dropdown-content a:hover {
      background: var(--border);
    }

    .dropdown-content a .rssi {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .dropdown-content.show {
      display: block;
    }

    /* ── Buttons ── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.7rem 1rem;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      text-decoration: none;
      letter-spacing: 0.01em;
      outline: none;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn svg {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0;
    }

    .btn-unlock svg {
      width: 20px;
      height: 20px;
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
      color: var(--text);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px rgba(79, 110, 247, 0.35);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 18px rgba(79, 110, 247, 0.45);
    }

    .btn-primary:active {
      background: var(--accent-active);
    }

    /* ── Unlock button — full width, prominent ── */
    .btn-unlock {
      background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
      color: #fff;
      font-size: 1.05rem;
      padding: 0.85rem 1rem;
      border-radius: var(--radius-sm);
      width: 100%;
      box-shadow: 0 4px 20px rgba(39, 174, 96, 0.35);
    }

    .btn-unlock:hover {
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      box-shadow: 0 6px 24px rgba(39, 174, 96, 0.5);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.1rem 0;
    }

    /* ── Toast / status message ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.88rem;
      padding: 0.65rem 1.2rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Mobile tweaks ── */
    @media (max-width: 480px) {
      .page {
        padding: 1rem 0.75rem 2rem;
      }

      .card {
        padding: 1.1rem;
      }

      .btn-row {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 1rem;
      }
    }
  </style>
  <script src="zepto.min.js"></script>
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="#fff" aria-hidden="true">
          <path
            d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z" />
        </svg>
      </div>
      <div>
        <h1>Door Unlock</h1>
        <div class="header-subtitle">Device Setup</div>
      </div>
    </div>
  </header>

  <!-- Main -->
  <div class="page">

    <!-- WiFi Card -->
    <div class="card">
      <div class="card-title">WiFi Configuration</div>

      <div class="field">
        <label for="ssid">Network Name (SSID)</label>
        <div class="input-row">
          <input type="text" id="ssid" name="ssid" placeholder="Select or type network…" autocomplete="off">
          <div class="dropdown">
            <button class="wifi-btn" onclick="listWifi()" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                stroke-linejoin="round" aria-hidden="true">
                <path
                  d="M1.5 8.5A16.5 16.5 0 0 1 22.5 8.5M5 12.5a11 11 0 0 1 14 0M8.5 16.5a6 6 0 0 1 7 0M12 20.5h.01" />
              </svg>
              Scan
            </button>
            <div id="dynamic-list" class="dropdown-content"></div>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="pass">Password</label>
        <input type="password" id="pass" name="pass" placeholder="WiFi password…" autocomplete="current-password">
      </div>
    </div>

    <!-- Hardware Card -->
    <div class="card">
      <div class="card-title">Hardware Settings</div>
      <div class="field">
        <label for="PD">Pulse Duration (ms)</label>
        <input type="number" id="PD" name="PD" placeholder="e.g. 500" min="50" max="10000">
      </div>
    </div>

    <!-- Actions Card -->
    <div class="card">
      <div class="card-title">Actions</div>

      <div class="btn-row">
        <button class="btn btn-secondary" id="scan" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M17.65 6.35A7.96 7.96 0 0 0 12 4a8 8 0 1 0 8 8h-2a6 6 0 1 1-1.76-4.24L13 11h7V4l-2.35 2.35z" />
          </svg>
          Scan WiFi
        </button>
        <button class="btn btn-primary" id="save" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path
              d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm3-10H5V5h10v4z" />
          </svg>
          Save
        </button>
      </div>

      <div class="divider"></div>

      <button class="btn btn-unlock" id="initstat" type="button">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path
            d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z" />
        </svg>
        Unlock Door
      </button>
    </div>

  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <script>
    function showToast(msg, duration) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('visible');
      clearTimeout(t._timer);
      t._timer = setTimeout(function () { t.classList.remove('visible'); }, duration || 2800);
    }

    function listWifi() {
      document.getElementById('dynamic-list').classList.toggle('show');
    }

    window.onclick = function (event) {
      if (!event.target.closest('.dropdown')) {
        var dropdowns = document.getElementsByClassName('dropdown-content');
        for (var i = 0; i < dropdowns.length; i++) {
          dropdowns[i].classList.remove('show');
        }
      }
    };

    function scanWifi() {
      console.log('Scan WiFi');
      $.ajax({
        url: '/rpc/Wifi.Scan',
        data: JSON.stringify({ key: 'app' }),
        type: 'POST',
        success: function (data) {
          var iDiv = document.getElementById('dynamic-list');
          data.forEach(function (item) {
            var a = document.createElement('a');
            a.innerHTML =
              '<span>' + item.ssid + '</span>' +
              '<span class="rssi">' + item.rssi + ' dBm</span>';
            a.addEventListener('click', function () {
              document.getElementById('ssid').value = item.ssid;
              document.getElementById('dynamic-list').classList.remove('show');
            });
            iDiv.appendChild(a);
          });
        }
      });
    }

    function removeItem() {
      var wifiList = document.getElementById('dynamic-list');
      while (wifiList.firstChild) {
        wifiList.removeChild(wifiList.firstChild);
      }
    }

    $('#save').on('click', function () {
      console.log('Set config');
      $.ajax({
        url: '/rpc/Config.Set',
        data: JSON.stringify({
          config: {
            wifi: {
              sta: {
                enable: true,
                ssid: $('#ssid').val(),
                pass: $('#pass').val()
              },
              ap: { enable: true }
            },
            hardware: {
              pulseTm: parseInt($('#PD').val())
            }
          }
        }),
        type: 'POST',
        success: function () {
          showToast('Settings saved — rebooting…');
          $.ajax({ url: '/rpc/Config.Save', type: 'POST', data: JSON.stringify({ reboot: true }) });
        }
      });
    });

    $('#initstat').on('click', function () {
      console.log('Change status');
      $.ajax({
        url: '/rpc/Config.Set',
        data: JSON.stringify({
          config: {
            hardware: {
              unlock: true,
              pulseTm: parseInt($('#PD').val())
            }
          }
        }),
        type: 'POST',
        success: function () {
          showToast('Door unlocked!');
          $.ajax({ url: '/rpc/Config.Save', type: 'POST', data: JSON.stringify({ reboot: true }) });
        }
      });
    });

    $('#scan').on('click', function () {
      removeItem();
      scanWifi();
      showToast('Scanning for networks…');
    });

    // Auto-scan on load
    (function () { scanWifi(); })();
  </script>

</body>

</html>
